name: Deploy Dioxus 0.7 to GitHub Pages

on:
  push:
    branches:
      - main 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli -y

      # We add --no-wasm-opt to prevent the pipeline from crashing on the Ubuntu runner
      # (You can remove this flag in the future if they patch the wasm-opt runner issue)
      - name: Build the App
        run: dx build --release --no-wasm-opt

      # Copy index.html to 404.html using the NEW Dioxus 0.7 output path
      - name: Create 404 fallback for Router
        run: cp target/dx/ak2tp-projekt/release/web/public/index.html target/dx/ak2tp-projekt/release/web/public/404.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      # Upload the exact folder Dioxus outputted
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './target/dx/ak2tp-projekt/release/web/public'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
